[sections.changed]

[[sections.changed.items]]
text = "Site release view extracted into a shared Release.svelte component — eliminates duplicated markup between index and version pages"
link = "https://github.com/Shaelz/ship-notes/commit/362c828"

[[sections.changed.items]]
text = "RSS feed title now reads from ship-notes.toml instead of being hardcoded"
