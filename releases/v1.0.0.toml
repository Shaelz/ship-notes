summary = "Contributor credits, author linking, and a major internal cleanup. The site is now a single shared component."

[sections.new]

[[sections.new.items]]
text = "Author credits per item — author field on release items, shown as a linked tag on the site"
link = "https://github.com/Shaelz/ship-notes/commit/9195ad0"

[[sections.new.items]]
text = "default_author config — falls back to git config user.name when not set"
link = "https://github.com/Shaelz/ship-notes/commit/9195ad0"

[[sections.new.items]]
text = "default_author_url — fallback link for author tags when no commit link is present"
