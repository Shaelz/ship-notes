version = "1.5.0"
date    = "2026-06-30"
name    = "Site & reliability"
summary = "SEO-ready changelog site, config consistency fixes, and a round of correctness work across the deploy pipeline."

[sections.new]

[[sections.new.items]]
text = "Changelog site now has proper page titles, meta descriptions, canonical URLs, and Open Graph tags on every page"
link = "https://github.com/Shaelz/ship-notes/commit/f78f873"

[[sections.new.items]]
text = "robots.txt and sitemap.xml generated automatically from your configured url when deployed"
link = "https://github.com/Shaelz/ship-notes/commit/f78f873"

[[sections.new.items]]
text = "OG preview image (/og.png) served with the site for social sharing"
link = "https://github.com/Shaelz/ship-notes/commit/f78f873"

[sections.fixed]

[[sections.fixed.items]]
text = "ship-notes add and ship-notes latest now respect releases_dir from config instead of always defaulting to releases/"
link = "https://github.com/Shaelz/ship-notes/commit/b35fa23"

[[sections.fixed.items]]
text = "Hard-refreshing a deep URL (/about, /v/1.2.0, etc.) on Vercel no longer returns 404"
link = "https://github.com/Shaelz/ship-notes/commit/c871ec9"

[[sections.fixed.items]]
text = "A malformed release TOML file in releases/ no longer crashes the site dev server — it logs a warning and skips that file"
link = "https://github.com/Shaelz/ship-notes/commit/f3ce38c"

[[sections.fixed.items]]
text = "Production site build was broken due to node:fs leaking into the browser bundle through an unshaken core re-export; fixed with a browser-safe entry point in @ship-notes/core"
link = "https://github.com/Shaelz/ship-notes/commit/5388063"

[[sections.fixed.items]]
text = "All deploy configs (Vercel, Netlify, GitHub Pages, npm publish) were missing the @ship-notes/core build step and would fail on a clean checkout"
link = "https://github.com/Shaelz/ship-notes/commit/9d03416"
