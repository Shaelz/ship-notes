name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @ship-notes/core build
      - run: pnpm --filter ship-notes build
      - run: pnpm --filter ship-notes test
      - run: pnpm --filter @ship-notes/site typecheck
      - run: pnpm --filter @ship-notes/site build
